<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Presets Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --accent: #06b6d4;
            --bg-dark: #0f0f1a;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            top: 40%;
            right: -10%;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            bottom: -10%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Header */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(15, 15, 26, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .logo i {
            font-size: 1.6rem;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Filter Tags */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Presets Grid */
        .presets-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }

        .presets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Preset Card */
        .preset-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .preset-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Preview Area */
        .preset-preview {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .preview-bg-dark {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        .preview-bg-gradient {
            background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b);
        }

        .preview-bg-light {
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
        }

        /* Mini Glass Element */
        .mini-glass {
            padding: 20px 28px;
            text-align: center;
            min-width: 160px;
        }

        .mini-glass h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .mini-glass p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .mini-btn {
            padding: 10px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            color: white;
            cursor: default;
        }

        .mini-navbar {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 260px;
        }

        .mini-navbar span {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .mini-navbar .links {
            display: flex;
            gap: 12px;
        }

        .mini-navbar .links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .mini-modal {
            padding: 16px;
            width: 100%;
            max-width: 260px;
        }

        .mini-modal h4 {
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .mini-modal p {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .mini-modal .actions {
            display: flex;
            gap: 8px;
        }

        .mini-input-wrapper {
            width: 100%;
            max-width: 260px;
        }

        .mini-input-wrapper label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .mini-input {
            width: 100%;
            padding: 10px 14px;
            border: none;
            outline: none;
            color: white;
            font-size: 0.85rem;
        }

        /* Card Info */
        .preset-info {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .preset-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .preset-name {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .preset-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            background: rgba(99,102,241,0.15);
            color: var(--primary);
        }

        .preset-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .preset-values {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .preset-value {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .preset-value strong {
            color: var(--accent);
        }

        .use-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .use-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.3);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
            }
            .presets-container {
                padding: 20px;
            }
            .presets-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-gem"></i>
            <span>Glassmorphism Generator</span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Generator</a>
            <a href="presets.html" class="nav-btn active">Presets</a>
        </div>
    </header>

    <section class="hero">
        <h1>Preset Gallery</h1>
        <p>Browse 10+ ready-to-use glassmorphism styles. Click any preset to open it in the generator.</p>
    </section>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="card">Card</button>
        <button class="filter-btn" data-filter="button">Button</button>
        <button class="filter-btn" data-filter="navbar">Navbar</button>
        <button class="filter-btn" data-filter="modal">Modal</button>
        <button class="filter-btn" data-filter="input">Input</button>
    </div>

    <div class="presets-container">
        <div class="presets-grid" id="presetsGrid">
            <!-- Presets will be inserted here by JavaScript -->
        </div>
    </div>

    <footer>
        <p>Glassmorphism CSS Generator — <a href="index.html">Create Your Own</a></p>
    </footer>

    <script>
        const presets = [
            {
                name: "Frost Card",
                desc: "Heavy blur with subtle gray tint. Perfect for overlay cards and profile sections.",
                tag: "Card",
                element: "card",
                bg: "gradient",
                blur: 40, opacity: 0.08, radius: 12, border: 0.15, shadow: 30,
                tint: "#94a3b8",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=40&opacity=0.08&radius=12&border=0.15&shadow=30&tint=94a3b8&bg=gradient&el=card"
            },
            {
                name: "Midnight Card",
                desc: "Deep dark blue with high border opacity. Great for premium dashboards.",
                tag: "Card",
                element: "card",
                bg: "gradient",
                blur: 27, opacity: 0.16, radius: 32, border: 0.4, shadow: 58,
                tint: "#1e1b4b",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=27&opacity=0.16&radius=32&border=0.4&shadow=58&tint=1e1b4b&bg=gradient&el=card"
            },
            {
                name: "Arctic Card",
                desc: "Soft purple with medium blur. Ideal for alerts and notification cards.",
                tag: "Card",
                element: "card",
                bg: "gradient",
                blur: 21, opacity: 0.29, radius: 17, border: 0.19, shadow: 16,
                tint: "#c084fc",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=21&opacity=0.29&radius=17&border=0.19&shadow=16&tint=c084fc&bg=gradient&el=card"
            },
            {
                name: "Gold Card",
                desc: "Warm golden glow with balanced transparency. Perfect for pricing cards.",
                tag: "Card",
                element: "card",
                bg: "gradient",
                blur: 23, opacity: 0.3, radius: 13, border: 0.23, shadow: 33,
                tint: "#fcd34d",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=23&opacity=0.3&radius=13&border=0.23&shadow=33&tint=fcd34d&bg=gradient&el=card"
            },
            {
                name: "Neon Button",
                desc: "Vibrant purple button on dark background. High contrast CTA style.",
                tag: "Button",
                element: "button",
                bg: "dark",
                blur: 9, opacity: 0.14, radius: 14, border: 0.08, shadow: 69,
                tint: "#c084fc",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=9&opacity=0.14&radius=14&border=0.08&shadow=69&tint=c084fc&bg=dark&el=button"
            },
            {
                name: "Arctic Button",
                desc: "Cyan frosted button with strong border. Clean and modern action button.",
                tag: "Button",
                element: "button",
                bg: "gradient",
                blur: 20, opacity: 0.16, radius: 24, border: 0.35, shadow: 65,
                tint: "#a5f3fc",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=20&opacity=0.16&radius=24&border=0.35&shadow=65&tint=a5f3fc&bg=gradient&el=button"
            },
            {
                name: "Frost Navbar",
                desc: "Clean white glass navigation bar. Subtle and professional header style.",
                tag: "Navbar",
                element: "navbar",
                bg: "gradient",
                blur: 31, opacity: 0.24, radius: 21, border: 0.33, shadow: 68,
                tint: "#ffffff",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=31&opacity=0.24&radius=21&border=0.33&shadow=68&tint=ffffff&bg=gradient&el=navbar"
            },
            {
                name: "Neon Modal",
                desc: "Purple glowing modal dialog. Eye-catching popup for important messages.",
                tag: "Modal",
                element: "modal",
                bg: "dark",
                blur: 8, opacity: 0.1, radius: 20, border: 0.4, shadow: 25,
                tint: "#c084fc",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=8&opacity=0.1&radius=20&border=0.4&shadow=25&tint=c084fc&bg=dark&el=modal"
            },
            {
                name: "Midnight Modal",
                desc: "Deep dark modal with soft edges. Elegant dialog for confirmations.",
                tag: "Modal",
                element: "modal",
                bg: "dark",
                blur: 12, opacity: 0.11, radius: 36, border: 0.2, shadow: 47,
                tint: "#1e1b4b",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=12&opacity=0.11&radius=36&border=0.2&shadow=47&tint=1e1b4b&bg=dark&el=modal"
            },
            {
                name: "Smoke Input",
                desc: "Gray tinted input field. Minimal and clean form element style.",
                tag: "Input",
                element: "input",
                bg: "dark",
                blur: 20, opacity: 0.08, radius: 12, border: 0.15, shadow: 30,
                tint: "#94a3b8",
                url: "https://imdarshankv.github.io/glassmorphism-generator/?blur=20&opacity=0.08&radius=12&border=0.15&shadow=30&tint=94a3b8&bg=dark&el=input"
            }
        ];

        function hexToRgba(hex, a) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return `rgba(${r}, ${g}, ${b}, ${a})`;
        }

        function getGlassStyle(preset) {
            const bg = hexToRgba(preset.tint, preset.opacity);
            const border = hexToRgba(preset.tint, preset.border);
            return `
                background: ${bg};
                backdrop-filter: blur(${preset.blur}px);
                -webkit-backdrop-filter: blur(${preset.blur}px);
                border-radius: ${preset.radius}px;
                border: 1px solid ${border};
                box-shadow: 0 8px ${preset.shadow}px rgba(0, 0, 0, 0.37);
            `;
        }

        function getPreviewHTML(preset) {
            const style = getGlassStyle(preset);
            const bgClass = `preview-bg-${preset.bg}`;

            if (preset.element === 'card') {
                return `<div class="mini-glass" style="${style}">
                    <h4>Card</h4>
                    <p>Preview</p>
                </div>`;
            } else if (preset.element === 'button') {
                return `<button class="mini-btn" style="${style}">Click Me</button>`;
            } else if (preset.element === 'navbar') {
                return `<div class="mini-navbar" style="${style}">
                    <span>Brand</span>
                    <div class="links">
                        <a href="#">Home</a>
                        <a href="#">About</a>
                    </div>
                </div>`;
            } else if (preset.element === 'modal') {
                return `<div class="mini-modal" style="${style}">
                    <h4>Modal Title</h4>
                    <p>Your message here</p>
                    <div class="actions">
                        <button class="mini-btn" style="padding:6px 14px;font-size:0.75rem;background:linear-gradient(135deg,#6366f1,#06b6d4);border:none;color:white;border-radius:6px;">OK</button>
                    </div>
                </div>`;
            } else if (preset.element === 'input') {
                return `<div class="mini-input-wrapper">
                    <label>Email</label>
                    <input type="text" class="mini-input" style="${style}" placeholder="Type here...">
                </div>`;
            }
        }

        function renderPresets(filter = 'all') {
            const grid = document.getElementById('presetsGrid');
            grid.innerHTML = '';

            const filtered = filter === 'all' 
                ? presets 
                : presets.filter(p => p.element === filter);

            filtered.forEach(preset => {
                const card = document.createElement('div');
                card.className = 'preset-card';
                card.dataset.element = preset.element;

                const previewHTML = getPreviewHTML(preset);
                const bgClass = `preview-bg-${preset.bg}`;

                card.innerHTML = `
                    <div class="preset-preview ${bgClass}">
                        ${previewHTML}
                    </div>
                    <div class="preset-info">
                        <div class="preset-header">
                            <span class="preset-name">${preset.name}</span>
                            <span class="preset-tag">${preset.tag}</span>
                        </div>
                        <p class="preset-desc">${preset.desc}</p>
                        <div class="preset-values">
                            <span class="preset-value">Blur: <strong>${preset.blur}px</strong></span>
                            <span class="preset-value">Opacity: <strong>${preset.opacity}</strong></span>
                            <span class="preset-value">Radius: <strong>${preset.radius}px</strong></span>
                        </div>
                        <a href="${preset.url}" class="use-btn" target="_blank">
                            <i class="fas fa-external-link-alt"></i>
                            Use This Preset
                        </a>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderPresets(btn.dataset.filter);
            });
        });

        // Initial render
        renderPresets();
    </script>
</body>
</html>
